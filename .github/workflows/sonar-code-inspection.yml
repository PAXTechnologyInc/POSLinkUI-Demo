name: POSLinkUIDemo Code Inspection

on:
  # manual trigger
  workflow_dispatch:
  # PR push develop or release/* branch
  pull_request:
    branches:
      - 'develop'
      - 'release/**'
    types: [opened, reopened, synchronize]

jobs:
  inspect:
    name: Inspect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }} #the source branch
          fetch-depth: 0

      - name: Checkout submodules using a PAT
        run: |
          # Change ssh to https, so that we can use a PAT instead of deploy keys to access different repos
          git config --file .gitmodules --get-regexp url | while read url; do
            git config --file=.gitmodules $(echo "$url" | sed -E "s/git@github.com:|https:\/\/github.com\//https:\/\/${{ secrets.CI_TOKEN }}:${{ secrets.CI_TOKEN }}@github.com\//")
          done
          git submodule sync
          git submodule update --init

          #TODO remove 393 case when SSF branch can be merged to trunk.
          # if the target branch is 393, then try checkout the same branches for all submodules, 
          # or fallback to branch 393
          if [[ "${{ github.base_ref }}" == "dev-ADJ-393" || "${{ github.base_ref }}" == test/v* ]]; then
            git submodule foreach '
              echo "Checking out ${{ github.head_ref }}"
              git checkout -f origin/${{ github.head_ref }}
              if [ "$?" -ne 0 ]; then
                echo "Checking out dev-ADJ-393"
                git checkout -f origin/dev-ADJ-393
              fi
            '
          else
            chmod +x ./updateSubmodules.sh
            ./updateSubmodules.sh
          fi

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: 11
      - name: Cache SonarQube packages
        uses: actions/cache@v1
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v1
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Analyze POSLinkUIDemo
        id: analyze
        env:
          GITHUB_USERNAME: ${{ secrets.CI_NAME }}               # for download pax private packages
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN }}         # for download pax private packages, Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_BOT_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          echo "Adding custom root certificate to java certificate store"
          rm -f /tmp/tmpcert.pem
          echo "${{ secrets.SONAR_ROOT_CERT }}" > /tmp/tmpcert.pem
          sudo keytool -keystore ${JAVA_HOME}/lib/security/cacerts -storepass changeit -noprompt -trustcacerts -importcert \
          -alias pax-sonarqube -file /tmp/tmpcert.pem -storetype pkcs12

          # sonar analysis parameters: https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/analysis-parameters/
          # project version is required to make increment code analysis, instead of full amount code analysis everytime
          # project key is unique for each project
          # project name is for easy distinction on project homepage
          if [[ ${{ github.event_name }} == 'workflow_dispatch' ]]; then            # triggered manually, no github.head_ref and github.base_ref
            _HEAD_REF=${GITHUB_REF##*/}                                             # eg: branch is SSF_20240327, github.ref = refs/heads/SSF_20240327
            _SONAR_PROJECT_VERSION=$_HEAD_REF-dispatch-$(date +'%Y-%m%d-%H%M')      # project version format: (head_ref)-dispatch-(yyyy-mmdd-hhmm)
            _SONAR_PROJECT_KEY=$(basename $(pwd))-$_HEAD_REF                        # project key format: (repository_name)-(head_ref)
            _SONAR_PROJECT_KEY=${_SONAR_PROJECT_KEY//-/_}                           # replace all dash with underscore in key
            _SONAR_PROJECT_KEY=${_SONAR_PROJECT_KEY////_}                           # replace all slash with underscore in key, slash is not allowed
            _SONAR_PROJECT_NAME=${_SONAR_PROJECT_KEY}                               # project name is the same as project key
          else                                                                      # triggered by pull requests, eg: working on bugfix/fix-sonar-workflow, want to merge into dev-ADJ-393
            _SONAR_PROJECT_VERSION=${{ github.base_ref }}                           # project version = dev-ADJ-393
            if [[ "${{ github.base_ref }}" != "develop" ]]; then                    # base_ref is not develop
              _SONAR_PROJECT_VERSION=${{ github.base_ref }}-${{ github.head_ref }}  # project version = dev-ADJ-393-bugfix/fix-sonar-workflow
            fi
            _SONAR_PROJECT_KEY=$(basename $(pwd))-${{ github.head_ref }}            # project key = BroadPOS-FDRC-bugfix/fix-sonar-workflow
            _SONAR_PROJECT_KEY=${_SONAR_PROJECT_KEY//-/_}                           # project key = BroadPOS_FDRC_bugfix/fix_sonar_workflow
            _SONAR_PROJECT_KEY=${_SONAR_PROJECT_KEY////_}                           # project key = BroadPOS_FDRC_bugfix_fix_sonar_workflow
                                                                                    # ////_: first two / is to select third /, means all slashes, fourth / is to replace with _
            _SONAR_PROJECT_NAME=${_SONAR_PROJECT_KEY}                               # project name is the same as project key
          fi
          
          echo "sonar_project_key=$_SONAR_PROJECT_KEY" >> "$GITHUB_OUTPUT"
          echo "sonar_project_name=$_SONAR_PROJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "sonar_project_version=$_SONAR_PROJECT_VERSION" >> "$GITHUB_OUTPUT"
          
          cd "${GITHUB_WORKSPACE}"
          chmod +x ./gradlew
          # we are using the community edition which only allow one branch per project,
          # the history will be messed when the head ref is changed.
          # However there is no limit to sonar project number, means
          # creating a new sonar scan project for a PR is what we can have currently to 
          # prevent reports from being overwritten.
          ./gradlew --stacktrace \
          -Dsonar.projectVersion=${_SONAR_PROJECT_VERSION} \
          -Dsonar.projectKey=${_SONAR_PROJECT_KEY} \
          -Dsonar.projectName=${_SONAR_PROJECT_NAME} \
          sonar

      - name: Create Comment
        if: ${{ !github.event.act }} # skip during local actions testing
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CI_TOKEN }}
          script: |
            const sonarReport = '[Sonar Code Inspection Report](${{ secrets.SONAR_HOST_URL }}/dashboard?id=${{ steps.analyze.outputs.sonar_project_key}})';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${sonarReport}`
            });