# SonarQube 扫描配置，CI 阶段 sonar-scanner 依赖此文件（本地 / fetch-sonar-rules 亦可使用）
sonar.host.url=http://172.16.3.60:9090
sonar.projectKey=POSLinkUI-Demo
sonar.projectName=POSLinkUI-Demo
sonar.projectVersion=1.0

sonar.sources=app/src/main/java
sonar.tests=app/src/test/java,app/src/androidTest/java
sonar.sourceEncoding=UTF-8

# Compiled bytecode (Java + Kotlin on JVM). CI must run assembleRelease and compile test variants before scan.
sonar.java.binaries=app/build/intermediates/javac/release/classes,app/build/tmp/kotlin-classes/release
sonar.java.test.binaries=app/build/intermediates/javac/debugUnitTest/classes,app/build/tmp/kotlin-classes/debugUnitTest,app/build/intermediates/javac/debugAndroidTest/classes,app/build/tmp/kotlin-classes/debugAndroidTest

# SpotBugs / fb-contrib noise on Kotlin + Compose (generated $composer, $stable, ComposableSingletons, PascalCase @Composable JVM names).
# EntryRequestUtils: broadcasts are explicit targeted (setPackage + non-blank package enforced in code).
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6

sonar.issue.ignore.multicriteria.e1.ruleKey=findbugs:NM_METHOD_NAMING_CONVENTION
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.kt

sonar.issue.ignore.multicriteria.e2.ruleKey=findbugs:NP_PARAMETER_MUST_BE_NONNULL_BUT_MARKED_AS_NULLABLE
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.kt

sonar.issue.ignore.multicriteria.e3.ruleKey=findbugs:UUF_UNUSED_PUBLIC_OR_PROTECTED_FIELD
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.kt

sonar.issue.ignore.multicriteria.e4.ruleKey=findbugs:MS_SHOULD_BE_FINAL
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.kt

sonar.issue.ignore.multicriteria.e5.ruleKey=fb-contrib:PDP_POORLY_DEFINED_PARAMETER
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.kt

sonar.issue.ignore.multicriteria.e6.ruleKey=findsecbugs:ANDROID_BROADCAST
sonar.issue.ignore.multicriteria.e6.resourceKey=**/EntryRequestUtils.kt
