# SonarQube 扫描配置，CI 阶段 sonar-scanner 依赖此文件
sonar.projectKey=POSLinkUI-Demo
sonar.projectName=POSLinkUI-Demo
sonar.projectVersion=1.0

# 源码目录（相对项目根）
sonar.sources=app/src/main/java
sonar.sourceEncoding=UTF-8

# 编译产物路径，供 Java 字节码分析（与 buildReleaseApk 缓存路径一致）
sonar.java.binaries=app/build/intermediates/javac
